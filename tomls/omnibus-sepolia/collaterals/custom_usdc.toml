[setting.custom_usdc_address]

[invoke.configureCustomUsdcCollateral]
target = ["system.CoreProxy"]
fromCall.func = "owner"
func = "configureCollateral"  # "args" see below in the multiline block

[[invoke.configureCustomUsdcCollateral.args]]
tokenAddress = "<%= settings.custom_usdc_address %>"
oracleNodeId = "<%= extras.eth_oracle_id %>"
issuanceRatioD18 = "<%= parseEther('1.1') %>"
liquidationRatioD18 = "<%= parseEther('1.01') %>"
liquidationRewardD18 = "<%= parseEther('0.01') %>"
minDelegationD18 = "<%= parseEther('1') %>"
depositingEnabled = true